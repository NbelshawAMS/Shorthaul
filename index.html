<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TX Fleet Profit Optimizer – Demo</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0b0f14; color:#fff; }
#map { height:100vh; width:100%; }
.sidebar {
  position:absolute; right:0; top:0; width:400px; height:100%;
  background:#111; overflow:auto; border-left:2px solid #333;
}
.tab { padding:10px; cursor:pointer; border-bottom:1px solid #333; }
.tab.active { background:#222; color:#ff6b2b; }
.pane { display:none; padding:10px; }
.pane.active { display:block; }
</style>
</head>

<body>

<div id="map"></div>

<div class="sidebar">
  <div class="tab active" onclick="switchTab('impact')">Impact</div>
  <div class="tab" onclick="switchTab('matcher')">Matcher</div>

  <div id="impact" class="pane active">
    <h3>Impact</h3>
    <div id="impactData"></div>
  </div>

  <div id="matcher" class="pane">
    <h3>Matcher</h3>
    <button onclick="runMatch()">Run Example Match</button>
    <div id="matchResult"></div>
  </div>
</div>

<script>
// ================= MAP =================
const map = L.map('map').setView([31,-97],6);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  maxZoom:19
}).addTo(map);

// Offices
const offices = [
  {name:"Dallas",lat:32.7767,lng:-96.7970,trucks:10},
  {name:"Carrollton",lat:32.9537,lng:-96.8903,trucks:26},
  {name:"Houston",lat:29.7604,lng:-95.3698,trucks:20},
  {name:"Austin",lat:30.2672,lng:-97.7431,trucks:15},
  {name:"San Antonio",lat:29.4241,lng:-98.4936,trucks:20}
];

offices.forEach(o=>{
  L.circleMarker([o.lat,o.lng],{
    radius:6 + o.trucks * 0.3,
    color:"#fff",
    fillColor:"#ff6b2b",
    fillOpacity:0.8
  }).addTo(map).bindPopup(`${o.name}<br>${o.trucks} trucks`);
});

// ================= TABS =================
function switchTab(id){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

// ================= BUSINESS LOGIC =================

// Pricing mix
const avgRevenue =
  (2000 * 0.15) +
  (3500 * 0.35) +
  (5000 * 0.35) +
  (6500 * 0.15);

// Example model
const longHaulMoves = 3000;
const truckDaysGained = 110;

// BEFORE
const beforeRevenue = longHaulMoves * avgRevenue;
const beforeProfit = beforeRevenue * 0.15;

// AFTER
const addedRevenue = truckDaysGained * 2000;
const afterRevenue = beforeRevenue + addedRevenue;
const afterProfit = beforeProfit + (addedRevenue * 0.25);

// ================= RENDER =================
document.getElementById("impactData").innerHTML = `
Before Revenue: $${Math.round(beforeRevenue).toLocaleString()}<br>
After Revenue: $${Math.round(afterRevenue).toLocaleString()}<br><br>

Before Profit: $${Math.round(beforeProfit).toLocaleString()}<br>
After Profit: $${Math.round(afterProfit).toLocaleString()}<br><br>

Truck Days Gained: ${truckDaysGained}<br>
Added Revenue (Truck Days): $${Math.round(addedRevenue).toLocaleString()}
`;

// ================= MATCHER =================
function runMatch(){
  document.getElementById("matchResult").innerHTML =
    "Dallas → Austin → Houston chain found<br>Profit Lift: $4,200";
}
</script>

</body>
</html>
